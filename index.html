<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background: #2d2d2d;
        padding: 20px;
        border-radius: 10px;
        width: 260px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    #display {
        width: 100%;
        height: 50px;
        font-size: 20px;
        margin-bottom: 10px;
        text-align: right;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #000;
        color: #0f0;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #444;
        color: white;
    }

    button:hover {
        background: #666;
    }

    .equal {
        background: #0078d7;
    }

    .equal:hover {
        background: #005fa3;
    }

    .special {
        background: #b22222;
    }

    .special:hover {
        background: #8b1a1a;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="append('/')">/</button>
        <button onclick="append('*')">*</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('-')">-</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="special" onclick="showDeveloper()">A</button>
        <button class="special" onclick="showApp()">B</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            if (display.value === "") return;
            display.value = Function("return " + display.value)();
        } catch {
            alert("Invalid Expression");
        }
    }

    function showDeveloper() {
        alert("Developer: Julie Pearl Gonzales\nCourse: BS Information Technology\nSchool: MSU Zamboanga Sibugay");
    }

    function showApp() {
        alert("Application: Web Calculator\nVersion: 1.0\nDescription: A simple calculator similar to Windows OS.");
    }

    // ✅ Keyboard support
    document.addEventListener("keydown", function(e) {
        if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
            append(e.key);
        } else if (e.key === "Enter") {
            calculate();
        } else if (e.key === "Backspace") {
            deleteLast();
        } else if (e.key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
